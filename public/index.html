<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爆款视频素材库</title>
  <meta name="description" content="管理爆款短视频的拆解素材：场景、道具、角色、结构">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部栏 -->
  <header id="app-header">
    <div class="header-left">
      <h1>🎬 爆款素材库</h1>
      <span class="video-count" id="video-count">0 个视频</span>
    </div>
    <div class="header-right">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="搜索名称、大纲、标签、机制…">
      </div>
      <button class="btn-primary" id="btn-add-video">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        新增视频
      </button>
    </div>
  </header>

  <!-- 视图切换 -->
  <nav id="view-tabs">
    <button class="tab active" data-view="all">全部视频</button>
    <button class="tab" data-view="scenes">场景汇总</button>
    <button class="tab" data-view="props">道具汇总</button>
    <button class="tab" data-view="characters">角色汇总</button>
  </nav>

  <!-- 筛选栏 -->
  <div id="filter-bar">
    <div class="filter-group">
      <select id="filter-video-tag">
        <option value="">视频标签</option>
      </select>
      <select id="filter-hook-tag">
        <option value="">开头标签</option>
      </select>
      <select id="filter-mechanism">
        <option value="">机制</option>
      </select>
    </div>
  </div>

  <!-- 标签分布统计 -->
  <div id="stats-bar" class="stats-bar" style="display:none"></div>

  <!-- 主内容区 -->
  <main id="main-content" class="content-wrapper">
    <div id="video-list"></div>
    <div id="summary-view" class="summary-table" style="display:none"></div>
    <div id="empty-state" class="empty-state" style="display:none">
      <div class="empty-icon">📦</div>
      <p>还没有视频素材</p>
      <p class="empty-hint">点击「新增视频」开始录入第一个爆款视频</p>
    </div>
  </main>
  
  <!-- 分页控件 -->
  <div id="pagination" class="pagination" style="display:none"></div>


  <!-- 新增/编辑弹窗 -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal" id="video-modal">
      <div class="modal-header">
        <h2 id="modal-title">新增视频</h2>
        <button class="btn-close" id="btn-close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="video-form">
          <input type="hidden" id="form-id">

          <!-- 基础信息 -->
          <div class="form-section-title">📋 基础信息</div>
          <div class="form-row">
            <div class="form-group flex-grow">
              <label for="form-name">视频名称 *</label>
              <input type="text" id="form-name" placeholder="如：煎蛋烫脚" required>
            </div>
            <div class="form-group">
              <label for="form-duration">时长（秒）</label>
              <input type="text" id="form-duration" placeholder="如：13" style="width:80px">
            </div>
          </div>

          <!-- 视频分析 -->
          <div class="form-section-title">🔍 视频分析</div>
          <div class="form-group">
            <label for="form-summary">故事大纲</label>
            <textarea id="form-summary" rows="3" placeholder="完整剧情，用男主/女主/男二…命名角色"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group flex-grow">
              <label for="form-hook-tags">开头标签</label>
              <input type="text" id="form-hook-tags" placeholder="如：异常行为, 冲突">
            </div>
          </div>
          <div class="form-group">
            <label for="form-hook">开头</label>
            <input type="text" id="form-hook" placeholder="前1-3秒的视觉钩子">
          </div>
          <div class="form-group">
            <label for="form-video-tags">视频标签</label>
            <input type="text" id="form-video-tags" placeholder="如：荒诞, 搞笑">
          </div>
          <div class="form-group">
            <label for="form-technique">标签手法</label>
            <input type="text" id="form-technique" placeholder="靠什么手法达成标签效果">
          </div>
          <div class="form-row">
            <div class="form-group" style="width:200px">
              <label for="form-mechanism-name">机制名称</label>
              <input type="text" id="form-mechanism-name" placeholder="如：不要在这叫">
            </div>
            <div class="form-group flex-grow">
              <label for="form-mechanism">机制链条</label>
              <input type="text" id="form-mechanism" placeholder="如：痛苦触发→不能叫的理由→忍耐累积→爆发">
            </div>
          </div>

          <!-- 角色立场 -->
          <div class="form-section-title">🦸 角色立场</div>
          <div class="form-row">
            <div class="form-group">
              <label for="form-protagonist">主角</label>
              <input type="text" id="form-protagonist" placeholder="如：jinu">
            </div>
            <div class="form-group flex-grow">
              <label for="form-protagonist-goal">主角目标</label>
              <input type="text" id="form-protagonist-goal" placeholder="如：找出谁是假Rumi">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="form-antagonist">反派</label>
              <input type="text" id="form-antagonist" placeholder="无则留空">
            </div>
            <div class="form-group flex-grow">
              <label for="form-antagonist-goal">反派目标</label>
              <input type="text" id="form-antagonist-goal" placeholder="无则留空">
            </div>
          </div>

          <!-- 改编溯源 -->
          <div class="form-section-title">🔄 改编溯源</div>
          <div class="form-group">
            <label for="form-adapt-tags">改编标签</label>
            <input type="text" id="form-adapt-tags" placeholder="如：换皮型改编（原创则留空）">
          </div>
          <div class="form-group">
            <label for="form-adapt-brief">改编简介</label>
            <input type="text" id="form-adapt-brief" placeholder="怎么改编来的（原创则留空）">
          </div>

          <!-- 场景 -->
          <div class="dynamic-section">
            <div class="section-header">
              <h3>🏠 场景</h3>
              <button type="button" class="btn-add-row" data-target="scenes">+ 添加场景</button>
            </div>
            <div id="scenes-container"></div>
          </div>

          <!-- 道具 -->
          <div class="dynamic-section">
            <div class="section-header">
              <h3>🔧 道具</h3>
              <button type="button" class="btn-add-row" data-target="props">+ 添加道具</button>
            </div>
            <div id="props-container"></div>
          </div>

          <!-- 角色 -->
          <div class="dynamic-section">
            <div class="section-header">
              <h3>👤 角色</h3>
              <button type="button" class="btn-add-row" data-target="characters">+ 添加角色</button>
            </div>
            <div id="characters-container"></div>
          </div>

          <!-- 元数据 -->
          <div class="form-section-title">📎 元数据</div>
          <div class="form-group">
            <label for="form-video-title">视频标题</label>
            <input type="text" id="form-video-title" placeholder="原视频在平台的标题">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="form-publish-date">发布日期</label>
              <input type="date" id="form-publish-date">
            </div>
            <div class="form-group">
              <label for="form-date">录入日期 *</label>
              <input type="date" id="form-date" required>
            </div>
          </div>
          <div class="form-group">
            <label for="form-video-link">视频链接</label>
            <input type="text" id="form-video-link" placeholder="原视频 URL">
          </div>
          <div class="form-row">
            <div class="form-group flex-grow">
              <label for="form-views">播放量</label>
              <input type="text" id="form-views" placeholder="如：8726165">
            </div>
            <div class="form-group flex-grow">
              <label for="form-likes">点赞量</label>
              <input type="text" id="form-likes" placeholder="如：106657">
            </div>
          </div>
          <div class="form-group">
            <label for="form-script-path">脚本路径</label>
            <input type="text" id="form-script-path" placeholder="如：scripts/煎蛋烫脚.md">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel">取消</button>
        <button class="btn-primary" id="btn-save">保存</button>
      </div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="detail-overlay" style="display:none">
    <div class="modal modal-detail" id="detail-modal">
      <div class="modal-header">
        <h2 id="detail-title">视频详情</h2>
        <button class="btn-close" id="btn-close-detail">&times;</button>
      </div>
      <div class="modal-body" id="detail-content"></div>
      <div class="modal-footer">
        <button class="btn-danger" id="btn-delete">删除</button>
        <button class="btn-primary" id="btn-edit">编辑</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
