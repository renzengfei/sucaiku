<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爆款视频素材库</title>
  <meta name="description" content="管理爆款短视频的拆解素材：场景、道具、角色、结构">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260426-workspace19">
</head>
<body>
  <!-- 顶部大 Tab -->
  <nav id="main-tabs">
    <button class="main-tab active" data-section="youtube">YouTube监控</button>
    <button class="main-tab" data-section="import">后台任务</button>
    <button class="main-tab" data-section="library">素材库</button>
  </nav>

  <!-- ==================== YouTube 监控 ==================== -->
  <section id="section-youtube" class="section-panel">
    <!-- 监控配置区 -->
    <div id="monitor-config-panel">
      <div class="monitor-config-header">
        <div class="monitor-config-title">
          <h2>监控条件</h2>
          <button class="btn-icon" id="btn-toggle-config" title="展开/折叠">▾</button>
        </div>
        <div class="monitor-status">
          <span id="monitor-last-refresh">上次刷新: --</span>
          <span id="monitor-refresh-status"></span>
          <button class="btn-primary" id="btn-refresh-now">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            立即刷新
          </button>
        </div>
      </div>
      <div class="monitor-config-body" id="monitor-config-body">
        <div class="config-add-form">
          <div class="config-form-row">
            <div class="form-group flex-grow">
              <label>关键词</label>
              <input type="text" id="config-keyword" placeholder="如：street food korea">
            </div>
            <div class="form-group">
              <label>时长</label>
              <select id="config-duration">
                <option value="any">全部</option>
                <option value="short" selected>&lt;4分钟</option>
                <option value="medium">4-20分钟</option>
                <option value="long">&gt;20分钟</option>
              </select>
            </div>
            <div class="form-group">
              <label>最低播放量</label>
              <select id="config-min-views">
                <option value="0">不限</option>
                <option value="10000">1万</option>
                <option value="100000">10万</option>
                <option value="1000000">100万</option>
                <option value="7500000" selected>750万</option>
                <option value="10000000">1000万</option>
              </select>
            </div>
            <div class="form-group" style="align-self:flex-end">
              <button class="btn-primary" id="btn-add-config">添加</button>
            </div>
          </div>
        </div>
        <div class="config-list" id="config-list">
          <!-- 动态渲染（含内嵌频道列表） -->
        </div>
      </div>
    </div>

    <!-- 筛选栏 -->
    <div id="monitor-filter-bar" class="monitor-filter-bar">
      <div class="filter-group">
        <select id="filter-monitor-type">
          <option value="1">短视频</option>
          <option value="0">长视频</option>
          <option value="">全部</option>
        </select>
        <select id="filter-monitor-keyword">
          <option value="">全部关键词</option>
        </select>
        <div class="filter-link-box">
          <input type="text" id="filter-monitor-link" placeholder="粘贴链接或 YouTube ID">
          <button type="button" id="btn-clear-monitor-link" class="filter-link-clear" title="清除" style="display:none">×</button>
        </div>
      </div>
      <div class="monitor-video-count" id="monitor-video-count">0 个视频</div>
    </div>

    <!-- 监控视频列表 -->
    <div id="monitor-video-list" class="content-wrapper">
      <div id="monitor-videos-grid" class="card-grid"></div>
      <div id="monitor-empty" class="empty-state" style="display:none">
        <div class="empty-icon">📡</div>
        <p>暂无监控到的视频</p>
        <p class="empty-hint">请先添加监控关键词，然后点击「立即刷新」</p>
      </div>
    </div>
    <div id="monitor-pagination" class="pagination" style="display:none"></div>

    <!-- 监控内视频播放浮层 -->
    <div id="monitor-player-overlay" class="player-overlay" style="display:none">
      <div class="player-container">
        <button class="player-close" id="btn-close-player">&times;</button>
        <div id="monitor-player-content"></div>
      </div>
    </div>
  </section>

  <!-- ==================== 后台任务 ==================== -->
  <section id="section-import" class="section-panel" style="display:none">
    <!-- 由 app.js 动态渲染 -->
  </section>

  <!-- ==================== 素材库 ==================== -->
  <section id="section-library" class="section-panel" style="display:none">
    <!-- 顶部栏 -->
    <header id="app-header">
      <div class="header-left">
        <h1>🎬 爆款素材库</h1>
        <span class="video-count" id="video-count">0 个视频</span>
      </div>
      <div class="header-right">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="search-input" placeholder="搜索名称、大纲、标签、系列…">
        </div>
        <button class="btn-primary" id="btn-add-video">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          新增视频
        </button>
      </div>
    </header>

    <!-- 视图切换 -->
    <nav id="view-tabs">
      <button class="tab active" data-view="all">全部视频</button>
      <button class="tab" data-view="scenes">场景汇总</button>
      <button class="tab" data-view="props">道具汇总</button>
      <button class="tab" data-view="characters">角色汇总</button>
      <button class="tab" data-view="hooks">开头标签汇总</button>
    </nav>

    <!-- 筛选栏 -->
    <div id="filter-bar">
      <div class="filter-group">
        <div class="segmented-control" id="library-display-mode">
          <button class="segmented-btn active" type="button" data-mode="latest">最新录入</button>
          <button class="segmented-btn" type="button" data-mode="series">按系列</button>
        </div>
        <select id="series-sort" style="display:none">
          <option value="recent">最近更新</option>
          <option value="series_desc">系列号新到旧</option>
          <option value="count_desc">视频数最多</option>
        </select>
        <select id="filter-video-tag">
          <option value="">视频标签</option>
        </select>
        <select id="filter-hook-tag">
          <option value="">开头标签</option>
        </select>
        <select id="filter-mechanism">
          <option value="">系列</option>
        </select>
        <select id="filter-mark-status">
          <option value="">标记状态</option>
          <option value="1">有用</option>
          <option value="-1">无用</option>
          <option value="2">重复</option>
          <option value="0">未标记</option>
        </select>
      </div>
    </div>

    <!-- 标签分布统计 -->
    <div id="stats-bar" class="stats-bar" style="display:none"></div>

    <!-- 主内容区 -->
    <main id="main-content" class="content-wrapper">
      <div id="list-view-container">
        <div id="video-list"></div>
        <div id="summary-view" class="summary-table" style="display:none"></div>
        <div id="empty-state" class="empty-state" style="display:none">
          <div class="empty-icon">📦</div>
          <p>还没有视频素材</p>
          <p class="empty-hint">点击「新增视频」开始录入第一个爆款视频</p>
        </div>
      </div>

      <!-- 内嵌详情视图 (默认隐藏) -->
      <div id="inline-detail-view" style="display:none">
        <div class="inline-detail-header">
          <button class="btn-secondary" id="btn-back-to-list">⬅️ 返回总览</button>
        </div>
        <div class="inline-detail-container">
          <!-- 左侧视频播放器 -->
          <div class="inline-detail-left">
            <div id="inline-video-player"></div>
          </div>
          <!-- 中间文字详情与表单 -->
          <div class="inline-detail-right">
            <div class="inline-detail-actions">
              <div style="display:flex;align-items:center;gap:8px">
                <h2 id="inline-detail-title">编辑视频</h2>
                <button class="btn-copy-id" id="btn-copy-video-id" type="button" title="复制编号和标题" style="display:none">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
              </div>
              <div class="action-buttons">
                <div class="mark-buttons" id="mark-buttons" aria-label="素材状态">
                  <button class="btn-mark-state mark-useless" data-mark="-1" type="button" title="标为无用">
                    <span class="mark-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </span>
                    <span>无用</span>
                  </button>
                  <button class="btn-mark-state mark-duplicate" data-mark="2" type="button" title="标为重复">
                    <span class="mark-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="10" height="10" rx="2"/><path d="M15 9V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/></svg>
                    </span>
                    <span>重复</span>
                  </button>
                  <button class="btn-mark-state mark-useful" data-mark="1" type="button" title="标为有用">
                    <span class="mark-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    </span>
                    <span>有用</span>
                  </button>
                </div>
                <button class="btn-primary" id="btn-save-inline">保存</button>
              </div>
            </div>
            <div class="inline-detail-content" id="inline-detail-content">
              <form id="video-form">
                <input type="hidden" id="form-id">
                <input type="hidden" id="form-is-marked" value="0">
                <!-- 视频标签与手法 — 故事线 -->
                <div class="dynamic-section">
                  <div class="section-header">
                    <h3>🏷️ 视频标签与手法 — 故事线</h3>
                    <button type="button" class="btn-add-row" id="btn-add-line">+ 添加线</button>
                  </div>
                  <div id="video_tags_rel-container" class="lines-container"></div>
                </div>

                <!-- 故事结构 -->
                <div class="story-structure-section">
                  <div class="story-structure-header">
                    <div class="form-section-title">🧩 故事结构</div>
                    <button class="btn-secondary btn-small story-replace-toggle" id="btn-toggle-story-replace" type="button" aria-expanded="false">
                      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3h4v4"/><path d="M21 3l-7 7"/><path d="M7 21H3v-4"/><path d="M3 21l7-7"/><path d="M14 14l7 7"/><path d="M21 21v-4h-4"/><path d="M3 3l7 7"/><path d="M3 7V3h4"/></svg>
                      <span>批量替换</span>
                    </button>
                  </div>
                  <div class="story-replace-panel story-replace-panel-hidden" id="story-replace-panel">
                    <div class="story-replace-row">
                      <label class="story-replace-field">
                        <span class="story-replace-label">查找</span>
                        <input type="text" id="story-replace-find" placeholder="输入要替换的内容">
                      </label>
                      <label class="story-replace-field">
                        <span class="story-replace-label">替换为</span>
                        <input type="text" id="story-replace-with" placeholder="输入新内容">
                      </label>
                      <button class="btn-primary btn-small" id="btn-story-replace-apply" type="button">全部替换</button>
                    </div>
                    <div class="story-replace-meta" id="story-replace-meta">输入查找内容后，会显示命中数量</div>
                  </div>
                  <div class="form-group">
                    <textarea id="form-story-structure" rows="12" placeholder="段落1 [核心悬念: xxx]&#10;1. 骨架事件1&#10;2. 骨架事件2&#10;与下一段关系: 负面发现&#10;&#10;段落2 [核心悬念: xxx]&#10;3. 骨架事件3&#10;4. 骨架事件4"></textarea>
                  </div>
                </div>

                <!-- 基础信息 -->
                <div class="form-section-title">📋 基础信息</div>
                <div class="form-row">
                  <div class="form-group flex-grow">
                    <label for="form-mechanism-name">系列名称</label>
                    <input type="text" id="form-mechanism-name" placeholder="如：不要在这叫">
                  </div>
                  <div class="form-group flex-grow">
                    <label for="form-name">视频名称</label>
                    <input type="text" id="form-name" placeholder="如：煎蛋烫脚（可留空）">
                  </div>
                  <div class="form-group">
                    <label for="form-duration">时长（秒）</label>
                    <input type="text" id="form-duration" placeholder="如：13" style="width:80px">
                  </div>
                </div>

                <!-- 视频分析 -->
                <div class="form-section-title">🔍 视频分析</div>
                <div class="form-group">
                  <label for="form-hook-tags">开头标签</label>
                  <input type="text" id="form-hook-tags" placeholder="如：异常行为, 冲突">
                </div>
                <div class="form-group">
                  <label for="form-hook">开头</label>
                  <input type="text" id="form-hook" placeholder="前1-3秒的视觉钩子">
                </div>

                <!-- 角色立场 -->
                <div class="form-section-title">🦸 角色立场</div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="form-protagonist">主角</label>
                    <input type="text" id="form-protagonist" placeholder="如：jinu">
                  </div>
                  <div class="form-group flex-grow">
                    <label for="form-protagonist-goal">主角目标</label>
                    <input type="text" id="form-protagonist-goal" placeholder="如：找出谁是假Rumi">
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="form-antagonist">反派</label>
                    <input type="text" id="form-antagonist" placeholder="无则留空">
                  </div>
                  <div class="form-group flex-grow">
                    <label for="form-antagonist-goal">反派目标</label>
                    <input type="text" id="form-antagonist-goal" placeholder="无则留空">
                  </div>
                </div>

                <!-- 改编溯源 -->
                <div class="form-section-title">🔄 改编溯源</div>
                <div class="form-group">
                  <label for="form-adapt-tags">改编标签</label>
                  <input type="text" id="form-adapt-tags" placeholder="如：换皮型改编（原创则留空）">
                </div>
                <div class="form-group">
                  <label for="form-adapt-brief">改编简介</label>
                  <input type="text" id="form-adapt-brief" placeholder="怎么改编来的（原创则留空）">
                </div>

                <!-- 场景 -->
                <div class="dynamic-section">
                  <div class="section-header">
                    <h3>🏠 场景</h3>
                    <button type="button" class="btn-add-row" data-target="scenes">+ 添加场景</button>
                  </div>
                  <div id="scenes-container"></div>
                </div>

                <!-- 道具 -->
                <div class="dynamic-section">
                  <div class="section-header">
                    <h3>🔧 道具</h3>
                    <button type="button" class="btn-add-row" data-target="props">+ 添加道具</button>
                  </div>
                  <div id="props-container"></div>
                </div>

                <!-- 角色 -->
                <div class="dynamic-section">
                  <div class="section-header">
                    <h3>👤 角色</h3>
                    <button type="button" class="btn-add-row" data-target="characters">+ 添加角色</button>
                  </div>
                  <div id="characters-container"></div>
                </div>

                <!-- 元数据 -->
                <div class="form-section-title">📎 元数据</div>
                <div class="form-group">
                  <label for="form-video-title">视频标题</label>
                  <input type="text" id="form-video-title" placeholder="原视频在平台的标题">
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="form-publish-date">发布日期</label>
                    <input type="date" id="form-publish-date">
                  </div>
                  <div class="form-group">
                    <label for="form-date">录入日期 *</label>
                    <input type="date" id="form-date" required>
                  </div>
                </div>
                <div class="form-group">
                  <label for="form-video-link">视频链接</label>
                  <input type="text" id="form-video-link" placeholder="原视频 URL">
                </div>
                <div class="form-row">
                  <div class="form-group flex-grow">
                    <label for="form-views">播放量</label>
                    <input type="text" id="form-views" placeholder="如：8726165">
                  </div>
                  <div class="form-group flex-grow">
                    <label for="form-likes">点赞量</label>
                    <input type="text" id="form-likes" placeholder="如：106657">
                  </div>
                </div>
                <!-- 底置操作区 -->
                <div class="form-bottom-actions">
                  <button class="btn-danger" id="btn-delete-inline" type="button">删除当前视频</button>
                </div>
              </form>
            </div>
          </div>

          <!-- 右侧 AI 对话 / Whisper 字幕 -->
          <aside class="inline-detail-ai" id="inline-ai-panel">
            <div class="ai-panel-header">
              <div class="ai-panel-tabs" role="tablist">
                <button class="ai-panel-tab" id="tab-ai" data-pane="ai" type="button" role="tab" aria-selected="false">💬 AI 对话</button>
                <button class="ai-panel-tab is-active" id="tab-transcript" data-pane="transcript" type="button" role="tab" aria-selected="true">🎧 Whisper 字幕</button>
              </div>
              <div class="ai-panel-actions">
                <button class="btn-small" id="btn-copy-ai-script" type="button">复制脚本</button>
                <button class="btn-secondary btn-small" id="btn-ai-restart" type="button">重启分析</button>
              </div>
            </div>
            <p id="ai-panel-status">选择视频后加载</p>

            <div class="ai-pane ai-pane-hidden" id="pane-ai">
              <div class="ai-conversation-list" id="ai-conversation-list">
                <div class="conv-empty">暂无 AI 对话</div>
              </div>
              <div class="ai-input-row">
                <textarea id="ai-chat-input" placeholder="向 Gemini 追加修改要求..."></textarea>
                <button class="btn-primary" id="btn-ai-send" type="button">发送</button>
              </div>
            </div>

            <div class="ai-pane" id="pane-transcript">
              <div class="transcript-toolbar">
                <span id="transcript-meta" class="transcript-meta">未加载</span>
                <span class="transcript-hint">点击任意行可复制</span>
              </div>
              <div class="transcript-grid-header" id="transcript-grid-header">
                <div class="transcript-col-header" data-col="merged">✨ 合并字幕</div>
                <div class="transcript-col-toggle" role="tablist">
                  <button class="transcript-toggle-btn is-active" data-col="youtube" type="button" role="tab">🎬 YouTube</button>
                  <button class="transcript-toggle-btn" data-col="whisper" type="button" role="tab">🎧 Whisper</button>
                </div>
              </div>
              <div class="transcript-grid" id="transcript-grid">
                <div class="conv-empty">暂无字幕</div>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <!-- 分页控件 -->
    <div id="pagination" class="pagination" style="display:none"></div>
  </section>

  <!-- 弹窗蒙层(素材库共用) -->
  <div id="modal-overlay" class="modal-overlay" style="display:none"></div>

  <script src="app.js?v=20260426-workspace19"></script>
</body>
</html>
